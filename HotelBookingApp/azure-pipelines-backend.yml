trigger:
  branches:
    include:
      - main
  paths:
    include:
      - SolHotelBookingAppWebApi/**
      - Dockerfile

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'

stages:
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: BuildJob
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET 10'
            inputs:
              packageType: 'sdk'
              version: '10.x'

          - task: DotNetCoreCLI@2
            displayName: 'Restore'
            inputs:
              command: 'restore'
              projects: 'SolHotelBookingAppWebApi/HotelBookingAppWebApi/HotelBookingAppWebApi.csproj'

          - task: DotNetCoreCLI@2
            displayName: 'Build'
            inputs:
              command: 'build'
              projects: 'SolHotelBookingAppWebApi/HotelBookingAppWebApi/HotelBookingAppWebApi.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'Test'
            inputs:
              command: 'test'
              projects: 'SolHotelBookingAppWebApi/**/*.Tests.csproj'
              arguments: '--configuration $(buildConfiguration)'

          - task: PublishBuildArtifacts@1
            displayName: 'Upload Artifact'
            inputs:
              PathtoPublish: 'SolHotelBookingAppWebApi/HotelBookingAppWebApi'
              ArtifactName: 'source'

  - stage: Migrate
    displayName: 'EF Core Migrations → Azure SQL'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: MigrateJob
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET 10'
            inputs:
              packageType: 'sdk'
              version: '10.x'

          - script: dotnet tool install --global dotnet-ef
            displayName: 'Install dotnet-ef'

          - script: |
              dotnet restore SolHotelBookingAppWebApi/HotelBookingAppWebApi/HotelBookingAppWebApi.csproj
              dotnet ef database update \
                --project SolHotelBookingAppWebApi/HotelBookingAppWebApi/HotelBookingAppWebApi.csproj \
                --connection "$(SQL_CONNECTION_STRING)"
            displayName: 'Apply Migrations to Azure SQL'

  - stage: Deploy
    displayName: 'Deploy to Railway'
    dependsOn: Migrate
    condition: succeeded()
    jobs:
      - deployment: DeployRailway
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - script: npm install -g @railway/cli
                  displayName: 'Install Railway CLI'

                - script: railway up --service stayhub-api --detach
                  displayName: 'Deploy to Railway'
                  env:
                    RAILWAY_TOKEN: $(RAILWAY_TOKEN)
