name: Backend — Build, Test & Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - 'SolHotelBookingAppWebApi/**'
      - 'Dockerfile'
      - '.dockerignore'

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore SolHotelBookingAppWebApi/HotelBookingAppWebApi/HotelBookingAppWebApi.csproj

      - name: Build
        run: dotnet build SolHotelBookingAppWebApi/HotelBookingAppWebApi/HotelBookingAppWebApi.csproj -c Release --no-restore

      - name: Test
        run: dotnet test SolHotelBookingAppWebApi/ -c Release
        continue-on-error: false

  migrate:
    name: Run EF Migrations on Azure SQL
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore SolHotelBookingAppWebApi/HotelBookingAppWebApi/HotelBookingAppWebApi.csproj

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Run EF Migrations
        run: |
          dotnet ef database update \
            --project SolHotelBookingAppWebApi/HotelBookingAppWebApi/HotelBookingAppWebApi.csproj \
            --connection "${{ secrets.SQL_CONNECTION_STRING }}"

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service stayhub-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
